name: pratospilla
description: Vacation Rental app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  carousel_slider: ^5.0.0
  table_calendar: ^3.1.2
  intl: ^0.19.0
  http: ^1.2.0
  icalendar_parser: any
  googleapis: ^16.0.0
  googleapis_auth: ^1.6.0
  google_sign_in: ^6.2.1
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  firebase_core: ^3.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  image_picker: ^1.1.2
  firebase_auth: ^5.7.0
  url_launcher: ^6.3.2
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
